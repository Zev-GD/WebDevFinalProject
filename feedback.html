<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container">
        <nav class="menu">
            <a href="browse.html">Browse Recipes</a>
            <a href="random.html">Get a Random Recipe</a>
            <a href="feedback.html">Share Feedback</a>
        </nav>

        <main class="content">
            <h1>Share Feedback!</h1>
            <form>
                <fieldset>
                    <legend>Contact Information</legend>
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name">
                    <br>
                    <label for="email">Your Email:</label>
                    <input type="text" id="email" name="email">
                </fieldset>
                <br>
                <fieldset>
                    <legend>Feedback</legend>
                    <div class="rating">
                        <input type="radio" id="5star" name="rating" value="5">
                        <label for="5star" title="5 stars">★</label>
                        <input type="radio" id="4star" name="rating" value="4">
                        <label for="4star" title="4 stars">★</label>
                        <input type="radio" id="3star" name="rating" value="3">
                        <label for="3star" title="3 stars">★</label>
                        <input type="radio" id="2star" name="rating" value="2">
                        <label for="2star" title="2 stars">★</label>
                        <input type="radio" id="1star" name="rating" value="1">
                        <label for="1star" title="1 stars">★</label>
                    
                </fieldset>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
