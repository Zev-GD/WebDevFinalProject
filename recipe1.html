    <div class="ingredients">
        <ul>
            <li>
                <label>
                    <input type="checkbox"> 3 cups all-purpose flour
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 3 teaspoons baking powder
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1/2 teaspoon baking soda
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1/2 teaspoon salt
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1 teaspoon ground cinnamon
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1/8 teaspoon ground nutmeg
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1/3 cup melted butter
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1/3 cup oil
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1 cup cane sugar
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 2 eggs
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1/3 cup sour cream or yogurt
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1 cup milk
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox"> 1 teaspoon vanilla extract
